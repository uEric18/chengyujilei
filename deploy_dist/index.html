<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>成语积累</title>
<style>
  :root {
    --blue: #007AFF; --red: #FF3B30; --green: #34C759;
    --gray: #8E8E93; --bg: #F2F2F7; --card: #FFFFFF;
    --separator: #E5E5EA; --text: #1C1C1E; --text2: #3C3C43; --text3: #8E8E93;
  }
  [data-theme="dark"] {
    --blue: #0A84FF; --red: #FF453A; --green: #30D158;
    --gray: #636366; --bg: #1C1C1E; --card: #2C2C2E;
    --separator: #38383A; --text: #FFFFFF; --text2: #E5E5EA; --text3: #8E8E93;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .app {
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
  }
  .topbar { padding: 48px 20px 0; text-align: center; }
  .topbar h1 { font-size: 34px; font-weight: 700; letter-spacing: 6px; color: var(--text); }
  .topbar .stats { font-size: 13px; color: var(--text3); margin-top: 4px; font-weight: 500; }
  .segmented { display: flex; margin: 20px 20px 0; background: #E5E5EA; border-radius: 8px; padding: 2px; }
  .segment { flex: 1; text-align: center; padding: 7px 0; font-size: 13px; font-weight: 500; color: var(--text); border-radius: 7px; cursor: pointer; transition: .2s; }
  .segment.active { background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 0 0 .5px rgba(0,0,0,.04); }
  .content { flex: 1; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }
  .card-wrap { perspective: 800px; flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .card { position: relative; width: 100%; aspect-ratio: 4/3; max-height: 280px; transition: transform .5s cubic-bezier(.4,0,.2,1); transform-style: preserve-3d; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px; background: var(--card); box-shadow: 0 2px 16px rgba(0,0,0,.06); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 28px; border: .5px solid rgba(0,0,0,.04); }
  .card-back { transform: rotateY(180deg); }
  .card .idiom { font-size: 44px; letter-spacing: 10px; font-weight: 700; color: var(--text); }
  .card .meaning { font-size: 17px; line-height: 1.65; color: var(--text2); text-align: center; font-weight: 400; }
  .card .hint { font-size: 12px; color: var(--text3); margin-top: 20px; font-weight: 500; }
  .progress-wrap { padding: 0 20px; }
  .progress-bar { height: 4px; background: #E5E5EA; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); transition: width .4s cubic-bezier(.4,0,.2,1); border-radius: 2px; }
  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; padding: 0 20px; }
  .btn { padding: 12px 22px; border-radius: 20px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; transition: all .18s; font-family: inherit; letter-spacing: .5px; }
  .btn:active { transform: scale(.96); opacity: .85; }
  .btn.primary { background: var(--blue); color: #fff; }
  .btn.secondary { background: #E5E5EA; color: var(--text); }
  .btn.danger { background: none; color: var(--red); padding: 6px 16px; }
  .btn.text { background: none; color: var(--blue); padding: 6px 16px; }
  .btn:disabled { opacity: .35; pointer-events: none; }
  .quiz .question { text-align: center; margin-bottom: 24px; }
  .quiz .question .big { font-size: 40px; font-weight: 700; letter-spacing: 8px; display: block; margin-bottom: 8px; }
  .quiz .question .sub { font-size: 15px; color: var(--text3); }
  .quiz .options { display: flex; flex-direction: column; gap: 10px; }
  .quiz .option { padding: 15px 18px; border-radius: 14px; cursor: pointer; background: #fff; font-size: 15px; line-height: 1.5; border: 1.5px solid transparent; transition: .15s; box-shadow: 0 1px 4px rgba(0,0,0,.03); }
  .quiz .option:active { transform: scale(.98); }
  .quiz .option.correct { border-color: var(--green); background: #F0FFF4; }
  .quiz .option.wrong { border-color: var(--red); background: #FFF5F5; }
  .quiz .feedback { text-align: center; font-size: 15px; margin-top: 18px; min-height: 24px; }
  .quiz .loading { color: var(--text3); font-size: 13px; text-align: center; padding: 20px 0; }
  .quiz .loading .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #E5E5EA; border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .import-area { display: flex; flex-direction: column; gap: 12px; }
  .import-area textarea { width: 100%; height: 200px; border: 1.5px solid #E5E5EA; border-radius: 14px; padding: 14px 16px; font-family: inherit; font-size: 14px; line-height: 1.7; resize: vertical; background: #fff; color: var(--text); -webkit-user-select: text; user-select: text; }
  .import-area textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,122,255,.1); }
  .import-area textarea::placeholder { color: #C7C7CC; }
  .import-area .tip { font-size: 13px; color: var(--text3); text-align: center; }
  /* ── Dictionary / Search ── */
  .search-wrap { display: flex; flex-direction: column; gap: 16px; }
  .search-box { display: flex; gap: 8px; }
  .search-box input { flex: 1; padding: 12px 16px; border: 1.5px solid #E5E5EA; border-radius: 14px; font-size: 16px; font-family: inherit; background: #fff; color: var(--text); -webkit-user-select: text; user-select: text; }
  .search-box input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,122,255,.1); }
  .search-box input::placeholder { color: #C7C7CC; }
  .search-box .btn { white-space: nowrap; }
  .dict-card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.04); }
  .dict-card .word-title { font-size: 24px; font-weight: 700; letter-spacing: 4px; margin-bottom: 4px; }
  .dict-card .pinyin { font-size: 14px; color: var(--text3); margin-bottom: 16px; }
  .dict-card .section { margin-bottom: 14px; }
  .dict-card .section:last-child { margin-bottom: 0; }
  .dict-card .label { font-size: 12px; font-weight: 600; color: var(--blue); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .dict-card .text { font-size: 15px; line-height: 1.6; color: var(--text2); }
  .dict-card .text.source { font-family: "Noto Serif SC", "STSong", "SimSun", serif; color: #666; font-size: 14px; }
  .dict-card .tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .dict-card .tag { display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 13px; background: #F2F2F7; color: var(--text2); }
  .dict-card .tag.syn { background: #E8F5E9; color: #2E7D32; }
  .dict-card .tag.ant { background: #FFF3E0; color: #E65100; }
  .search-hint { text-align: center; color: var(--text3); font-size: 14px; padding: 32px 0; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 8px; margin-left: 4px; vertical-align: middle; }
  .badge.online { background: #E8F5E9; color: #34C759; }
  .badge.offline { background: #FFF3E0; color: #FF9500; }
  /* ── Theme toggle ── */
  .theme-btn { position: absolute; top: 48px; right: 20px; width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--separator); background: var(--card); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .2s; }
  .theme-btn:active { transform: scale(.9); }
  /* ── Search suggestions ── */
  .suggestions-wrap { position: relative; }
  .suggestions { position: absolute; top: 100%; left: 0; right: 0; z-index: 10; background: var(--card); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.12); max-height: 320px; overflow-y: auto; display: none; margin-top: 4px; }
  .suggestions.show { display: block; }
  .suggestions .item { padding: 11px 16px; cursor: pointer; font-size: 15px; border-bottom: .5px solid var(--separator); display: flex; justify-content: space-between; align-items: center; }
  .suggestions .item:last-child { border-bottom: none; }
  .suggestions .item:hover, .suggestions .item.active { background: rgba(0,122,255,.08); }
  .suggestions .item .word { font-weight: 600; color: var(--text); }
  .suggestions .item .py { font-size: 12px; color: var(--text3); }
  /* ── Search history ── */
  .history-wrap { margin-top: 12px; }
  .history-wrap .label { font-size: 12px; color: var(--text3); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .history-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-tag { padding: 5px 12px; border-radius: 14px; font-size: 13px; cursor: pointer; background: var(--card); border: 1px solid var(--separator); color: var(--text2); transition: .15s; }
  .history-tag:active { transform: scale(.95); background: rgba(0,122,255,.08); border-color: var(--blue); }
  .history-clear { font-size: 11px; color: var(--red); cursor: pointer; background: none; border: none; }
  .hidden { display: none !important; }
  .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(28,28,30,.88); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: #fff; padding: 10px 24px; border-radius: 20px; font-size: 14px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>成语积累</h1>
    <div class="stats" id="stats">—</div>
    <button class="theme-btn" id="btnTheme" title="切换暗色模式">🌙</button>
  </div>
  <div class="segmented">
    <div class="segment active" data-tab="learn">学习</div>
    <div class="segment" data-tab="quiz">测验</div>
    <div class="segment" data-tab="dict">词典</div>
    <div class="segment" data-tab="import">导入</div>
  </div>
  <div class="content" id="tab-learn">
    <div class="card-wrap" id="cardWrap">
      <div class="card" id="card">
        <div class="card-face card-front"><div class="idiom" id="idiomFront">—</div><div class="hint">轻点翻转</div></div>
        <div class="card-face card-back"><div class="meaning" id="meaningBack">—</div><div class="hint">轻点翻回</div></div>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div></div>
    <div class="btn-row">
      <button class="btn primary" id="btnKnown">认识了</button>
      <button class="btn secondary" id="btnNext">下一个</button>
    </div>
    <div class="btn-row">
      <button class="btn text" id="btnShuffle">随机打乱</button>
      <button class="btn text" id="btnShowUnknown">只看未掌握</button>
    </div>
  </div>
  <div class="content hidden" id="tab-quiz">
    <div class="quiz" id="quizArea">
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="loading hidden" id="quizLoading"><span class="spinner"></span>正在从网络获取易错释义…</div>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn primary" id="btnNextQ" disabled>下一题</button>
      <button class="btn secondary" id="btnNewQuiz">新一轮</button>
    </div>
  </div>
  <div class="content hidden" id="tab-dict">
    <div class="search-wrap">
      <div class="search-box">
        <div class="suggestions-wrap" style="flex:1;position:relative;">
          <input type="text" id="searchInput" placeholder="输入成语，如「望其项背」" autocomplete="off" style="width:100%;">
          <div class="suggestions" id="searchSuggestions"></div>
        </div>
        <button class="btn primary" id="btnSearch">搜索</button>
      </div>
      <div class="history-wrap" id="searchHistory" style="display:none;">
        <div class="label"><span>最近搜索</span><button class="history-clear" id="btnClearHistory">清空</button></div>
        <div class="history-tags" id="historyTags"></div>
      </div>
      <div id="searchResult">
        <div class="search-hint">输入成语查看出处、例句、近义词、反义词</div>
      </div>
    </div>
  </div>
  <div class="content hidden" id="tab-import">
    <div class="import-area">
      <textarea id="importText" placeholder="每行一条。可只写成语名，自动补释义&#10;例如：&#10;望其项背 能够望见别人的颈项和背脊，表示赶得上或比得上&#10;差强人意&#10;不刊之论"></textarea>
      <div class="tip">只写成语名会自动从词典补释义 · 已有 <strong id="importCount">0</strong> 条</div>
      <div class="btn-row">
        <button class="btn primary" id="btnAppend">追加导入</button>
        <button class="btn secondary" id="btnImport">导入并替换</button>
      </div>
      <div class="btn-row">
        <button class="btn text" id="btnExport">导出备份</button>
        <button class="btn danger" id="btnClear">清空全部</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'jichengyu_data';
const PROGRESS_KEY = 'jichengyu_progress';
const ONLINE_CACHE_KEY = 'jichengyu_online_cache';

const DEFAULT_IDIOMS = [
  ['望其项背', '能够望见别人的颈项和背脊，表示赶得上或比得上'],
  ['差强人意', '大体上还能使人满意'],
  ['不刊之论', '比喻不能改动或不可磨灭的言论'],
  ['首当其冲', '比喻最先受到攻击或遭到灾难'],
  ['万人空巷', '家家户户的人都从巷里出来了，多形容庆祝、欢迎等盛况'],
  ['不孚众望', '不能使大家信服，未符合大家的期望'],
  ['不负众望', '不辜负大家的期望'],
  ['目无全牛', '眼中没有完整的牛，形容技艺已达到十分纯熟的地步'],
  ['炙手可热', '手一挨近就感到热，比喻气焰很盛，权势很大'],
  ['文不加点', '文章一气呵成，无须修改，形容文思敏捷，写作技巧纯熟'],
];

let idioms = [];
let unknownSet = new Set();
let currentIndex = 0;
let currentMode = 'all';
let shuffledIndices = [];

// ── Toast ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── Data ──
function loadIdioms() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { idioms = JSON.parse(raw); } else { idioms = [...DEFAULT_IDIOMS]; saveIdioms(); }
}
function saveIdioms() { localStorage.setItem(STORAGE_KEY, JSON.stringify(idioms)); }
function loadProgress() {
  const raw = localStorage.getItem(PROGRESS_KEY);
  if (raw) unknownSet = new Set(JSON.parse(raw));
}
function saveProgress() { localStorage.setItem(PROGRESS_KEY, JSON.stringify([...unknownSet])); }
async function parseImport(text) {
  // 确保词典已加载
  if (!IDIOM_DICT_COMPACT) {
    try { await loadCompactDict(); } catch(e) {}
  }
  const result = [];
  for (const line of text.trim().split(/[\n\r]+/)) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const parts = trimmed.split(/[：:：\s\t]+/);
    if (parts.length >= 2) {
      const word = parts[0], meaning = parts.slice(1).join('');
      if (word && meaning) result.push([word, meaning]);
    } else {
      const word = trimmed;
      if (word.length >= 2) {
        if (IDIOM_DICT[word]) {
          result.push([word, IDIOM_DICT[word][1]]);
        } else if (IDIOM_DICT_COMPACT) {
          const entry = IDIOM_DICT_COMPACT.find(e => e[0] === word);
          if (entry) result.push([word, entry[2]]);
          else result.push([word, '（待补充释义）']);
        } else {
          result.push([word, '（待补充释义）']);
        }
      }
    }
  }
  return result;
}

// ── Review ──
function getReviewList() {
  if (idioms.length === 0) return [];
  if (currentMode === 'unknown' && unknownSet.size === 0) {
    toast('全部已掌握 ✓'); currentMode = 'all';
    document.getElementById('btnShowUnknown').textContent = '只看未掌握';
  }
  let list = [];
  for (let i = 0; i < idioms.length; i++) {
    if (currentMode === 'unknown' && !unknownSet.has(i)) continue;
    list.push(i);
  }
  const orderMap = new Map(shuffledIndices.map((v, i) => [v, i]));
  list.sort((a, b) => (orderMap.get(a) ?? a) - (orderMap.get(b) ?? b));
  return list;
}
function showCurrentCard() {
  const list = getReviewList();
  if (list.length === 0) {
    document.getElementById('idiomFront').textContent = '(空)';
    document.getElementById('meaningBack').textContent = '还没有成语，去「导入」添加吧';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('btnKnown').disabled = true;
    document.getElementById('btnNext').disabled = true;
    return;
  }
  if (currentIndex >= list.length) currentIndex = 0;
  const idx = list[currentIndex];
  const [word, meaning] = idioms[idx];
  document.getElementById('idiomFront').textContent = word;
  document.getElementById('meaningBack').textContent = meaning;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('progressFill').style.width =
    idioms.length ? `${(list.length - [...list].filter(i => unknownSet.has(i)).length) / list.length * 100}%` : '0%';
  document.getElementById('btnKnown').disabled = false;
  document.getElementById('btnKnown').textContent = unknownSet.has(idx) ? '认识了' : '还不熟';
  document.getElementById('btnNext').disabled = false;
  updateStats();
}
function updateStats() {
  const total = idioms.length, known = total - unknownSet.size;
  let s = `共 ${total} 条 · 已掌握 ${known} · 待复习 ${unknownSet.size}`;
  if (currentMode === 'unknown') s += ' · 筛选中';
  document.getElementById('stats').textContent = s;
}

// ═══════════════════════════════════════════════════
//  易错释义库（内置 200+ 常见易错成语）
//  格式: 成语 → [常见误解1, 误解2, 误解3]
// ═══════════════════════════════════════════════════
const WRONG_MEANINGS = {
  '首当其冲': ['冲在最前面，起到带头作用', '首先冲在前面，抢占先机', '处于最领先的位置'],
  '差强人意': ['让人很不满意，差劲到极点', '不能让人满意，很差', '勉强能接受但还是不满意'],
  '望其项背': ['远远落后，望不到对方的背影', '差距太大，追都追不上', '只能远远看着，无法靠近'],
  '不刊之论': ['不能刊登发表的言论', '不值得刊登的文章', '被禁止发表的错误言论'],
  '万人空巷': ['巷子里空无一人，冷冷清清', '所有人都躲在家里不出门', '街道空旷人迹罕至'],
  '炙手可热': ['非常抢手，人人都想要', '很受欢迎，超级热门', '火到烫手的热门事物'],
  '文不加点': ['写文章不加标点符号', '文章没有重点', '写作潦草不讲究格式'],
  '目无全牛': ['目光短浅，看不到整体大局', '眼界狭窄，只见局部', '看不到完整的牛、不识大体'],
  '不孚众望': ['不辜负大家的期望，很争气', '没有辜负众人的期待', '名副其实、众望所归'],
  '不负众望': ['不能让大家信服，名不副实', '辜负了大家的期望', '配不上大家的期待'],
  '七月流火': ['七月份天气像火一样炎热', '盛夏酷暑热浪滚滚', '夏天热得像火烧一样'],
  '罪不容诛': ['罪行不重，不至于被诛杀', '罪过不大可以原谅', '虽然有罪但罪不至死'],
  '不足为训': ['不值得作为教训来吸取', '不足以作为训诫警示', '不够资格教训别人'],
  '久假不归': ['长期请假不回来上班', '请假很久不归队', '长假之后不回来'],
  '弹冠相庆': ['值得庆祝的大好事', '弹掉帽子上的灰准备庆祝', '喜庆热闹的场面'],
  '曾几何时': ['曾经有很长一段时间', '很久很久以前', '在过去的某个时期里'],

// ── 在线缓存 ──
function loadOnlineCache() {
  try { return JSON.parse(localStorage.getItem(ONLINE_CACHE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveOnlineCache(cache) {
  try { localStorage.setItem(ONLINE_CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
}

// ── 在线查找易错释义 ──
// 通过 CORS 代理从搜索引擎获取 "成语 误用" 相关片段
const CORS_PROXIES = [
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url=',
];

async function fetchWrongMeaningsOnline(word) {
  // 先查缓存
  const cache = loadOnlineCache();
  if (cache[word] && cache[word].length >= 1) return cache[word];

  // 用多个搜索引擎搜 "成语 误用 常被误解"
  const queries = [
    `https://www.baidu.com/s?wd=${encodeURIComponent(word + ' 误用 常被误解为')}`,
    `https://www.baidu.com/s?wd=${encodeURIComponent(word + ' 容易用错 错误理解')}`,
  ];

  let allSnippets = [];

  for (const proxy of CORS_PROXIES) {
    for (const query of queries) {
      try {
        const resp = await fetch(proxy + encodeURIComponent(query), {
          signal: AbortSignal.timeout(8000)
        });
        if (!resp.ok) continue;
        const html = await resp.text();

        // 从搜索结果中提取片段
        // 百度搜索结果常见模式: "常被误解为XXX" "误用作XXX" "很多人以为是XXX"
        const patterns = [
          /(?:常被|经常被|容易被|常有人)(?:误解|误用|误认|错认)(?:为|成|是)(.{4,40}?)(?:[。，；\s<])/g,
          /(?:误用作|误用为|误作|错用作)(.{4,40}?)(?:[。，；\s<])/g,
          /很多人(?:以为|认为是|觉得是)(.{4,40}?)(?:[。，；\s<])/g,
          /(?:其实|实际上|事实上)(?:不是|并非)(.{4,40}?)(?:[。，；\s<])/g,
          /(?:不要|不能|不可)(?:理解为|认为是|当作)(.{4,40}?)(?:[。，；\s<])/g,
          /<em>(.{2,30}?)<\/em>/g,
        ];

        for (const pattern of patterns) {
          let match;
          while ((match = pattern.exec(html)) !== null) {
            let text = match[1].replace(/<[^>]+>/g, '').trim();
            // 过滤掉非中文内容、太短或包含URL的
            if (text.length >= 3 && text.length <= 50 &&
                /[一-鿿]/.test(text) &&
                !text.includes('http') && !text.includes('www') &&
                text !== word) {
              // 去掉可能残留的标签
              text = text.replace(/<\/?[^>]+>/g, '').replace(/&[a-z]+;/g, '').trim();
              if (text.length >= 3) allSnippets.push(text);
            }
          }
        }
      } catch(e) {
        // 该代理/查询失败，继续下一个
      }
    }
    if (allSnippets.length >= 3) break; // 已经够了
  }

  // 去重、清洗
  const seen = new Set();
  const cleaned = [];
  for (const s of allSnippets) {
    const key = s.replace(/[，。！？、；：""''（）\s]/g, '');
    if (!seen.has(key) && key.length >= 3 && cleaned.length < 5) {
      seen.add(key);
      cleaned.push(s);
    }
  }

  // 缓存结果
  if (cleaned.length >= 1) {
    cache[word] = cleaned;
    saveOnlineCache(cache);
    return cleaned;
  }

  // 完全没找到，标记空防止重复请求
  cache[word] = [];
  saveOnlineCache(cache);
  return [];
}

// ── 获取干扰项（三合一：内置 → 在线缓存 → 在线获取 → 字面生成 → 其他释义）──
async function getWrongOptions(correctIdx) {
  const word = idioms[correctIdx][0];
  const correctMeaning = idioms[correctIdx][1];

  // 1. 查内置库
  const builtin = WRONG_MEANINGS[word] || [];
  const distractors = builtin.filter(d => d && d !== correctMeaning);

  if (distractors.length >= 3) return distractors.slice(0, 3);

  // 2. 查在线缓存
  const cache = loadOnlineCache();
  if (cache[word] && cache[word].length >= 1) {
    for (const c of cache[word]) {
      if (distractors.length >= 3) break;
      if (!distractors.includes(c) && c !== correctMeaning) distractors.push(c);
    }
  }

  if (distractors.length >= 3) return distractors.slice(0, 3);

  // 3. 尝试在线获取（仅在用户明确需要时）
  // 这里先返回已有的，后台继续获取供下次使用
  // 不够时用字面生成 + 其他释义补充
  const literal = generateLiteralWrong(word);
  for (const l of literal) {
    if (distractors.length >= 3) break;
    if (!distractors.includes(l) && l !== correctMeaning) distractors.push(l);
  }

  // 4. 还是不够，从其他成语释义补充
  if (distractors.length < 3) {
    const others = idioms.map((_, i) => i).filter(i =>
      i !== correctIdx && !distractors.includes(idioms[i][1]) && idioms[i][1] !== correctMeaning
    );
    shuffle(others);
    for (const oi of others) {
      if (distractors.length >= 3) break;
      if (!distractors.includes(idioms[oi][1])) distractors.push(idioms[oi][1]);
    }
  }

  return distractors.slice(0, 3);
}

// ── 批量预取：为所有不在内置库的成语提前从网络获取 ──
async function prefetchAllOnline() {
  const cache = loadOnlineCache();
  const toFetch = [];
  for (const [word] of idioms) {
    if (!WRONG_MEANINGS[word] && !cache[word]) {
      toFetch.push(word);
    }
  }
  if (toFetch.length === 0) return;

  document.getElementById('quizLoading').classList.remove('hidden');
  document.getElementById('quizLoading').innerHTML =
    `<span class="spinner"></span>正在为 ${toFetch.length} 个成语联网查找易错释义…`;

  let done = 0;
  for (const word of toFetch) {
    await fetchWrongMeaningsOnline(word);
    done++;
    document.getElementById('quizLoading').innerHTML =
      `<span class="spinner"></span>联网查找中… ${done}/${toFetch.length}`;
  }

  document.getElementById('quizLoading').classList.add('hidden');
  const newCache = loadOnlineCache();
  const found = toFetch.filter(w => newCache[w] && newCache[w].length > 0).length;
  if (found > 0) toast(`已为 ${found} 个成语找到网络释义 ✓`);
  else toast('网络查找未找到新释义，使用内置库');
}

let IDIOM_DICT_COMPACT=null;let IDIOM_DICT_COMPACT_FAILED=false;function loadCompactDict(){if(IDIOM_DICT_COMPACT)return Promise.resolve(IDIOM_DICT_COMPACT);if(IDIOM_DICT_COMPACT_FAILED)return Promise.reject(new Error('dict.json unavailable'));return fetch('dict.json').then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(d=>{IDIOM_DICT_COMPACT=d;return d;}).catch(e=>{IDIOM_DICT_COMPACT_FAILED=true;console.error('加载扩展词典失败:',e);throw e;});}

function loadDictCache() {
  try { return JSON.parse(localStorage.getItem(DICT_CACHE_KEY)) || {}; } catch(e) { return {}; }
}
function saveDictCache(cache) {
  try { localStorage.setItem(DICT_CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
}

async function fetchWithTimeout(url, timeout = 8000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeout);
  try {
    const resp = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    return resp;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

async function searchIdiom(word) {
  var cache = loadDictCache();

  // 1. 精品词典
  if (IDIOM_DICT[word]) {
    var parts = IDIOM_DICT[word];
    var pinyin = parts[0], meaning = parts[1], source = parts[2], example = parts[3], synonyms = parts[4], antonyms = parts[5];
    var result = {
      word: word, pinyin: pinyin, meaning: meaning, source: source, example: example, found: true,
      synonyms: synonyms ? synonyms.split(';').filter(Boolean) : [],
      antonyms: antonyms ? antonyms.split(';').filter(Boolean) : [],
    };
    cache[word] = result;
    saveDictCache(cache);
    renderDictResult(result);
    return result;
  }

  // 2. 在线缓存
  if (cache[word]) { renderDictResult(cache[word]); return cache[word]; }

  // 3. 扩展词典（按需加载）
  try {
    var dict = await loadCompactDict();
    var compactEntry = dict.find(function(e) { return e[0] === word; });
    if (compactEntry) {
      var w = compactEntry[0], pinyin = compactEntry[1], meaning = compactEntry[2], source = compactEntry[3], example = compactEntry[4];
      var result = { word: w, pinyin: pinyin, meaning: meaning, source: source, example: example, found: true, synonyms: [], antonyms: [] };
      cache[word] = result;
      saveDictCache(cache);
      renderDictResult(result);
      return result;
    }
  } catch(e) {
    // dict.json 加载失败，回退到内置词典
    renderDictResult({ word: word, found: false, error: '扩展词典加载失败，仅搜索内置词典' });
    return { word: word, found: false };
  }

  // 4. 用户导入的成语列表
  var importedEntry = idioms.find(function(e) { return e[0] === word; });
  if (importedEntry) {
    var result = { word: importedEntry[0], meaning: importedEntry[1], found: true, synonyms: [], antonyms: [] };
    cache[word] = result;
    saveDictCache(cache);
    renderDictResult(result);
    return result;
  }

  // 都没有
  var notFound = { word: word, found: false };
  renderDictResult(notFound);
  return notFound;
}

    return;
  }

      <div style="margin-top:12px;">
        <a href="https://baike.baidu.com/item/${encodeURIComponent(data.word)}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none;font-size:14px;">在百度百科中查看 →</a>
      </div></div>`;
    return;
  }

  let html = `<div class="dict-card">`;
  html += `<div class="word-title">${data.word}</div>`;
  if (data.pinyin) html += `<div class="pinyin">${data.pinyin}</div>`;
  if (data.meaning || data.summary) {
    html += `<div class="section"><div class="label">释义</div><div class="text">${data.meaning || data.summary}</div></div>`;
  }
  if (data.source) {
    html += `<div class="section"><div class="label">出处</div><div class="text source">${data.source}</div></div>`;
  }
  if (data.example) {
    html += `<div class="section"><div class="label">例句</div><div class="text">${data.example}</div></div>`;
  }
  if (data.synonyms && data.synonyms.length > 0) {
    html += `<div class="section"><div class="label">近义词</div><div class="tag-row">`;
    for (const s of data.synonyms) html += `<span class="tag syn">${s}</span>`;
    html += `</div></div>`;
  }
  if (data.antonyms && data.antonyms.length > 0) {
    html += `<div class="section"><div class="label">反义词</div><div class="tag-row">`;
    for (const a of data.antonyms) html += `<span class="tag ant">${a}</span>`;
    html += `</div></div>`;
  }

  html += `</div>`;
  html += `<div style="text-align:center;margin-top:8px;"><span style="font-size:11px;color:var(--text3);">内置词典 · 共收录 ${Object.keys(IDIOM_DICT).length}+ 条成语</span></div>`;
  el.innerHTML = html;
}

// ── Quiz ──
let quizIdiomIdx = -1, quizAnswered = false;

async function generateQuiz() {
  if (idioms.length < 4) {
    document.getElementById('question').innerHTML =
      '<div class="big" style="font-size:20px;color:var(--text3);">需要至少 4 条成语</div>';
    document.getElementById('options').innerHTML = '';
    return;
  }
  quizAnswered = false;
  document.getElementById('btnNextQ').disabled = true;
  document.getElementById('feedback').textContent = '';

  const pool = unknownSet.size >= 3 ? [...unknownSet] : idioms.map((_, i) => i);
  quizIdiomIdx = pool[Math.floor(Math.random() * pool.length)];
  const [word, correctMeaning] = idioms[quizIdiomIdx];

  // 获取干扰项（可能是异步的如果触发了在线获取）
  const distractorTexts = await getWrongOptions(quizIdiomIdx);

  const options = [
    { text: correctMeaning, isCorrect: true },
    ...distractorTexts.map(t => ({ text: t, isCorrect: false })),
  ];
  shuffle(options);

  document.getElementById('question').innerHTML =
    `<div class="big">${word}</div><div class="sub">这个成语是什么意思？</div>`;
  document.getElementById('options').innerHTML = options.map((o, i) =>
    `<div class="option" data-i="${i}" data-correct="${o.isCorrect}">${o.text}</div>`
  ).join('');
  document.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => handleQuizAnswer(el));
  });
}

function handleQuizAnswer(el) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = el.dataset.correct === 'true';
  const all = document.querySelectorAll('.option');
  all.forEach(o => o.style.pointerEvents = 'none');

  if (isCorrect) {
    el.classList.add('correct');
    document.getElementById('feedback').innerHTML = '<span style="color:#34C759;">回答正确 ✓</span>';
    if (unknownSet.has(quizIdiomIdx)) {
      unknownSet.delete(quizIdiomIdx); saveProgress(); updateStats();
    }
  } else {
    el.classList.add('wrong');
    document.getElementById('feedback').innerHTML =
      `<span style="color:#FF3B30;">回答错误</span><br>正确答案：<strong>${idioms[quizIdiomIdx][1]}</strong>`;
    all.forEach(o => { if (o.dataset.correct === 'true') o.classList.add('correct'); });
  }
  document.getElementById('btnNextQ').disabled = false;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ── Tabs ──
function switchTab(name) {
  document.querySelectorAll('.segment').forEach(s => s.classList.remove('active'));
  document.querySelector(`.segment[data-tab="${name}"]`).classList.add('active');
  ['learn','quiz','dict','import'].forEach(t =>
    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== name));
  if (name === 'quiz') generateQuiz();
  if (name === 'import') updateImportCount();
}

function updateImportCount() { document.getElementById('importCount').textContent = idioms.length; }

// ── Init ──
async function init() {
  loadIdioms(); loadProgress();
  shuffledIndices = idioms.map((_, i) => i);

  document.getElementById('cardWrap').addEventListener('click', () => {
    document.getElementById('card').classList.toggle('flipped');
  });

  document.getElementById('btnKnown').addEventListener('click', () => {
    const list = getReviewList();
    if (!list.length) return;
    const idx = list[currentIndex];
    if (unknownSet.has(idx)) unknownSet.delete(idx); else unknownSet.add(idx);
    saveProgress(); updateStats(); showCurrentCard();
    toast(unknownSet.has(idx) ? '标为未掌握' : '已掌握 ✓');
  });

  document.getElementById('btnNext').addEventListener('click', () => {
    const list = getReviewList();
    if (!list.length) return;
    currentIndex = (currentIndex + 1) % list.length;
    showCurrentCard();
  });

  document.getElementById('btnShuffle').addEventListener('click', () => {
    const list = getReviewList();
    shuffle(list);
    shuffledIndices = list;
    currentIndex = 0;
    showCurrentCard();
    toast('已打乱 🔀');
  });

  document.getElementById('btnShowUnknown').addEventListener('click', function() {
    if (currentMode === 'all') {
      currentMode = 'unknown'; this.textContent = '查看全部';
    } else {
      currentMode = 'all'; this.textContent = '只看未掌握';
    }
    currentIndex = 0; showCurrentCard();
  });

  const btnReset = document.getElementById('btnReset');
  if (btnReset) btnReset.addEventListener('click', () => {
    if (confirm('将所有成语重新标记为「未掌握」？')) {
      unknownSet = new Set(idioms.map((_, i) => i)); saveProgress();
      currentIndex = 0; currentMode = 'all';
      document.getElementById('btnShowUnknown').textContent = '只看未掌握';
      showCurrentCard(); toast('已重置');
    }
  });

  // Quiz buttons
  document.getElementById('btnNextQ').addEventListener('click', generateQuiz);
  document.getElementById('btnNewQuiz').addEventListener('click', generateQuiz);

  // Import buttons
  document.getElementById('btnImport').addEventListener('click', async () => {
    const parsed = await parseImport(document.getElementById('importText').value);
    if (!parsed.length) { toast('未识别到成语'); return; }
    if (!confirm(`识别到 ${parsed.length} 条，将替换现有 ${idioms.length} 条。确定？`)) return;
    idioms = parsed;
    unknownSet = new Set(idioms.map((_, i) => i));
    saveIdioms(); saveProgress();
    shuffledIndices = idioms.map((_, i) => i);
    currentIndex = 0; currentMode = 'all';
    document.getElementById('btnShowUnknown').textContent = '只看未掌握';
    document.getElementById('importText').value = '';
    updateImportCount(); showCurrentCard();
    toast(`已导入 ${parsed.length} 条`);
    prefetchAllOnline();  // 为新词联网查找易错释义
  });

  document.getElementById('btnAppend').addEventListener('click', async () => {
    const parsed = await parseImport(document.getElementById('importText').value);
    if (!parsed.length) { toast('未识别到成语'); return; }
    const start = idioms.length;
    idioms.push(...parsed);
    for (let i = start; i < idioms.length; i++) unknownSet.add(i);
    saveIdioms(); saveProgress();
    shuffledIndices = idioms.map((_, i) => i);
    document.getElementById('importText').value = '';
    updateImportCount();
    toast(`追加 ${parsed.length} 条`);
    prefetchAllOnline();  // 为新词联网查找易错释义
  });

  document.getElementById('btnExport').addEventListener('click', () => {
    let text = '';
    const order = shuffledIndices.length === idioms.length ? shuffledIndices : idioms.map((_, i) => i);
    for (const i of order) text += `${idioms[i][0]}  ${idioms[i][1]}\n`;
    navigator.clipboard.writeText(text).then(() => toast('已复制到剪贴板'));
  });

  document.getElementById('btnClear').addEventListener('click', () => {
    if (!confirm('清空所有成语？建议先导出备份。')) return;
    idioms = []; unknownSet = new Set(); shuffledIndices = [];
    saveIdioms(); saveProgress();
    currentIndex = 0;
    document.getElementById('importText').value = '';
    updateImportCount(); showCurrentCard();
    toast('已清空');
  });

  document.querySelectorAll('.segment').forEach(s =>
    s.addEventListener('click', () => switchTab(s.dataset.tab)));

  // Dictionary search (Enter is handled by autocomplete keydown below)
  document.getElementById('btnSearch').addEventListener('click', () => {
    const word = document.getElementById('searchInput').value.trim();
    if (word) searchIdiom(word).catch(e => console.error('搜索失败:', e));
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ') { e.preventDefault();
      document.getElementById('card').classList.toggle('flipped'); }
    else if (e.key === 'ArrowRight') document.getElementById('btnNext').click();
    else if (e.key === 'ArrowLeft') {
      const list = getReviewList();
      if (list.length) { currentIndex = (currentIndex - 1 + list.length) % list.length; showCurrentCard(); }
    }
  });

  updateImportCount();
  showCurrentCard();

  // 后台预取网络释义
  prefetchAllOnline();

  // ═══════════════════════════════════════════════════
  //  暗色模式
  // ═══════════════════════════════════════════════════
  const btnTheme = document.getElementById('btnTheme');
  function applyTheme(dark) {
    if (dark) {
      document.documentElement.setAttribute('data-theme', 'dark');
      btnTheme.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      btnTheme.textContent = '🌙';
    }
  }
  const savedTheme = localStorage.getItem('jichengyu_theme');
  applyTheme(savedTheme === 'dark');
  btnTheme.addEventListener('click', () => {
    const isDark = document.documentElement.hasAttribute('data-theme');
    applyTheme(!isDark);
    localStorage.setItem('jichengyu_theme', !isDark ? 'dark' : 'light');
  });

  // ═══════════════════════════════════════════════════
  //  搜索自动补全
  // ═══════════════════════════════════════════════════
  const searchInput = document.getElementById('searchInput');
  const suggestionsEl = document.getElementById('searchSuggestions');
  let suggestionIdx = -1;

  function getSuggestions(query) {
    if (!query || query.length < 1) return [];
    const results = [];
    const seen = new Set();
    // 内置词典
    for (const key of Object.keys(IDIOM_DICT)) {
      if (key.startsWith(query) && !seen.has(key)) {
        seen.add(key);
        results.push({ word: key, pinyin: IDIOM_DICT[key][0] });
      }
    }
    // 扩展词典（如果已加载）
    if (IDIOM_DICT_COMPACT) {
      for (const entry of IDIOM_DICT_COMPACT) {
        const key = entry[0];
        if (key.startsWith(query) && !seen.has(key)) {
          seen.add(key);
          results.push({ word: key, pinyin: entry[1] || '' });
        }
        if (results.length >= 20) break;
      }
    }
    return results.slice(0, 8);
  }

  function showSuggestions(suggestions) {
    if (!suggestions.length) {
      suggestionsEl.classList.remove('show');
      return;
    }
    suggestionIdx = -1;
    let html = '';
    for (let i = 0; i < suggestions.length; i++) {
      const s = suggestions[i];
      html += `<div class="item" data-idx="${i}" data-word="${s.word}">
        <span class="word">${s.word}</span>
        <span class="py">${s.pinyin}</span>
      </div>`;
    }
    suggestionsEl.innerHTML = html;
    suggestionsEl.classList.add('show');
    // 点击事件
    suggestionsEl.querySelectorAll('.item').forEach(item => {
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        const word = item.dataset.word;
        searchInput.value = word;
        suggestionsEl.classList.remove('show');
        searchIdiom(word).catch(e => console.error('搜索失败:', e));
      });
    });
  }

  searchInput.addEventListener('input', () => {
    const query = searchInput.value.trim();
    const suggestions = getSuggestions(query);
    showSuggestions(suggestions);
  });

  searchInput.addEventListener('keydown', e => {
    const items = suggestionsEl.querySelectorAll('.item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (items.length === 0) return;
      suggestionIdx = Math.min(suggestionIdx + 1, items.length - 1);
      items.forEach((item, i) => item.classList.toggle('active', i === suggestionIdx));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (items.length === 0) return;
      suggestionIdx = Math.max(suggestionIdx - 1, 0);
      items.forEach((item, i) => item.classList.toggle('active', i === suggestionIdx));
    } else if (e.key === 'Enter') {
      if (suggestionIdx >= 0 && items[suggestionIdx]) {
        e.preventDefault();
        const word = items[suggestionIdx].dataset.word;
        searchInput.value = word;
        suggestionsEl.classList.remove('show');
        searchIdiom(word).catch(e => console.error('搜索失败:', e));
      } else {
        // No suggestion selected, do plain search
        const word = searchInput.value.trim();
        if (word) searchIdiom(word).catch(e => console.error('搜索失败:', e));
      }
    } else if (e.key === 'Escape') {
      suggestionsEl.classList.remove('show');
    }
  });

  searchInput.addEventListener('blur', () => {
    setTimeout(() => suggestionsEl.classList.remove('show'), 150);
  });

  searchInput.addEventListener('focus', () => {
    const query = searchInput.value.trim();
    if (query) {
      const suggestions = getSuggestions(query);
      showSuggestions(suggestions);
    } else {
      renderSearchHistory();
    }
  });

  // ═══════════════════════════════════════════════════
  //  搜索历史
  // ═══════════════════════════════════════════════════
  const HISTORY_KEY = 'jichengyu_search_history';
  const MAX_HISTORY = 10;

  function loadSearchHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveSearchHistory(history) {
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }
    catch(e) {}
  }

  function addSearchHistory(word) {
    let history = loadSearchHistory();
    history = history.filter(w => w !== word);
    history.unshift(word);
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    saveSearchHistory(history);
  }

  function renderSearchHistory() {
    const history = loadSearchHistory();
    const wrap = document.getElementById('searchHistory');
    const tagsEl = document.getElementById('historyTags');
    if (!history.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    let html = '';
    for (const word of history) {
      html += `<span class="history-tag" data-word="${word}">${word}</span>`;
    }
    tagsEl.innerHTML = html;
    tagsEl.querySelectorAll('.history-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const word = tag.dataset.word;
        searchInput.value = word;
        searchIdiom(word).catch(e => console.error('搜索失败:', e));
      });
    });
  }

  document.getElementById('btnClearHistory').addEventListener('click', () => {
    localStorage.removeItem(HISTORY_KEY);
    document.getElementById('searchHistory').style.display = 'none';
  });

  // 包装原始 searchIdiom，添加历史记录
  const _originalSearchIdiom = searchIdiom;
  searchIdiom = async function(word) {
    addSearchHistory(word);
    renderSearchHistory();
    return await _originalSearchIdiom(word);
  };

  // 初始化搜索历史
  renderSearchHistory();
}

init();
</script>
